name: KOMET
description: "KOMET — Media Pembelajaran Kreativitas Digital. Aplikasi Android visual block programming untuk cerita interaktif bercabang (offline-first)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Service Locator (PIC D) ──────────────────────────────────────
  get_it: ^8.0.3

  # ── Routing (PIC D) ─────────────────────────────────────────────
  go_router: ^14.6.3

  # ── State Management (PIC D – Canvas; PIC lain bebas adopsi) ────
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # ── Local Storage / Offline-First (PIC B – interface dari PIC D)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Network / Connectivity (PIC D interface → PIC B implementasi)
  connectivity_plus: ^6.1.4

  # ── Utilities ───────────────────────────────────────────────────
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.5

  # ── Cloud Database (PIC B) ──────────────────────────────────────
  mongo_dart: ^0.10.8
  flutter_dotenv: ^5.2.1
  
  # ── Firebase & Google Auth ──────────────────────────────────────
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  google_sign_in: ^6.2.2
  crypto: ^3.0.7
  flutter_blockly: ^1.6.0
  image_picker: ^1.2.1
  tflite_flutter: ^0.12.1
  flutter_slidable: ^4.0.3
  material_symbols_icons: ^4.2759.0
  boxicons: ^2.1.3
  ming_cute_icons: ^0.0.7
  mailer: ^7.1.0
  webview_flutter: ^4.10.0
  image: ^4.8.0
  path_provider: ^2.1.5
  google_mlkit_subject_segmentation: ^0.0.3
  
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # ── Testing helpers ─────────────────────────────────────────
  bloc_test: ^10.0.0

  # ── Code Generation (Hive adapters) ─────────────────────────────
  build_runner: 2.4.13
  hive_generator: ^2.0.1
  faker: ^2.2.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo_padded.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/models/

  # Fonts: dikonfigurasi PIC C setelah UI Design final
  # fonts:
  #   - family: Nunito
  #     fonts:
  #       - asset: assets/fonts/Nunito-Regular.ttf
  #       - asset: assets/fonts/Nunito-Bold.ttf
  #         weight: 700